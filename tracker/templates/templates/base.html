<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ExpenseTracker{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar">
  <a href="{% url 'dashboard' %}" class="navbar-brand">EXPENSE<span>TRACKER</span></a>
  <ul class="nav-links">
    <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
    <li><a href="{% url 'logout' %}" onclick="this.closest('form') && this.closest('form').submit(); return false;">Logout</a></li>
  </ul>
</nav>
{% endif %}

<div class="container">
  {% if messages %}
  <ul class="messages" style="list-style:none; padding:0; margin-bottom:1rem;">
    {% for message in messages %}
    <li class="message {{ message.tags }}"
        style="padding:0.75rem 1rem; border-radius:4px; margin-bottom:0.5rem;
               {% if message.tags == 'success' %}background:rgba(0,255,159,0.1);border:1px solid #00ff9f;color:#00ff9f;
               {% elif message.tags == 'error' %}background:rgba(255,42,109,0.1);border:1px solid #ff2a6d;color:#ff2a6d;
               {% endif %}">
      {{ message }}
    </li>
    {% endfor %}
  </ul>
  {% endif %}

  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
