{% extends 'tracker/base.html' %}
{% block title %}Login | ExpenseTracker{% endblock %}

{% block content %}
<div style="max-width:420px; margin:6rem auto;">
  <div class="card">
    <h1 style="font-family:'Orbitron',sans-serif; font-size:1.4rem; color:#0177B5;
                text-align:center; margin-bottom:0.4rem; letter-spacing:3px;">
      SYSTEM LOGIN
    </h1>
    <p style="text-align:center; color:#6b8fa3; margin-bottom:2rem; font-size:0.9rem;">
      Access your financial dashboard
    </p>

    <form method="post">
      {% csrf_token %}
      <!-- csrf_token adds a hidden field with a secret token -->
      <!-- Django verifies it on POST to prevent Cross-Site Request Forgery attacks -->
      <!-- Without it, a malicious site could submit forms on behalf of your users -->

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" name="username" id="username" class="cyber-input" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" name="password" id="password" class="cyber-input" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">
        LOGIN
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; color:#6b8fa3; font-size:0.9rem;">
      No account?
      <a href="{% url 'register' %}" style="color:#FE6B35; text-decoration:none;">
        Register here →
      </a>
    </p>
  </div>
</div>
{% endblock %}
